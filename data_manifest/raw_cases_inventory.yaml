# Raw cases inventory — parser manifest between on-disk
# HDF5 filenames and physical conditions (G, D, Y/c).
# Regenerated by scripts/periodic_v2/100c_raw_cases_inventory.py.
# Edit-by-hand discouraged; rerun the script to refresh.

manifest_version: raw_cases_inventory_v1
created_iso: '2026-05-15T09:07:24.925657+00:00'
source: scripts/periodic_v2/100c_raw_cases_inventory.py

# -------------------------------------------------------------
# Physical constants (apply to every case below).
# -------------------------------------------------------------
physical_constants:
  airfoil: NACA0012
  alpha_deg: 14.0
  Re: 5000
  dt_tc: 0.05            # convective time per snapshot
  gust_period_tc: 6.0    # gust released every 6 t/c
  encounter_frames: 120  # = gust_period_tc / dt_tc (locked Plan v3.3 / v3.4)
  frames_per_source:
    periodic: 800    # 6 full encounters + 80-frame trailing partial
    run3: 480        # 4 full encounters, no trailing partial

# -------------------------------------------------------------
# Filename parser (locked Plan v3.3 / v3.4 convention).
# `s` token encodes G (can be negative); `d` token encodes D.
# `x` and `y` tokens encode airfoil leading-edge position
# which round-trips to Y/c via the α=14° rotation below.
# -------------------------------------------------------------
parser:
  regex_g: 's(-?\d+\.\d+)'
  regex_d: 'd(\d+\.\d)'
  regex_x: 'x(-?\d+\.\d+)'
  regex_y: 'y(-?\d+\.\d+)'
  alpha_deg: 14.0
  cos_alpha: 0.9702957263
  sin_alpha: 0.2419218956
  formula_forward:
    y_file: '-0.484 + cos(14°) * Y'
    x_file: '-1.941 - sin(14°) * Y'
  formula_inverse:
    Y_from_y_file: '(y_file + 0.484) / cos(14°)'
    Y_from_x_file: '-(x_file + 1.941) / sin(14°)'
  doe2_y_grid: [-0.4, -0.2, -0.1, 0.0, +0.1, +0.2, +0.4]
  case_id_format: 'G{G:+.2f}_D{D:.2f}_Y{Y:+.2f}'

# -------------------------------------------------------------
# Summary.
# -------------------------------------------------------------
summary:
  n_cases_total: 41
  n_cases_periodic: 21
  n_cases_run3: 20
  n_parse_errors: 0
  n_duplicate_case_ids: 0

